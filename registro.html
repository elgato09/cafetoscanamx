  <link href="https://fonts.googleapis.com/css2?family=Katibeh&display=swap" rel="stylesheet">

  <title>Registro</title>
</head>

<body>

  <nav class="navbar navbar-expand-lg fondo-nav">

    <div class="container">

      <a class="navbar-brand" href="index.html">
        <img src="./images/logo toscana.png" width="90">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="menu">

        <ul class="navbar-nav align-items-center gap-lg-2">

          <li class="nav-item">
            <a href="productos.html" class="nav-link boton-nav">Productos</a>
          </li>

          <li class="nav-item">
            <a href="pedidos.html" class="nav-link boton-nav">Pedidos</a>
          </li>

          <li class="nav-item">
            <a href="galeria.html" class="nav-link boton-nav">Galería</a>
          </li>

          <li class="nav-item">
            <a href="contactos.html" class="nav-link boton-nav">Contactos</a>
          </li>

          <li class="nav-item">
            <a href="sesion.html" class="nav-link boton-login">Iniciar sesión</a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <div class="container-fluid py-3">
    <h1 class="titulo-principal">Registro</h1>
  </div>

  <main class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-8">

        <div class="card border-0 shadow tarjeta-registro">

          <div class="card-body p-5">

            <div class="row align-items-center g-5">

              <div class="col-md-4 text-center">

                <img src="./images/foto.jpg" class="img-fluid perfil-img" alt="perfil">

                <button class="btn subir-foto mt-4">
                  Subir foto
                </button>

              </div>

              <div class="col-md-8">

                <form action="perfil.html" class="needs-validation">

  <div class="mb-3">
    <input 
      type="text" 
      class="form-control input-estilo" 
      placeholder="Nombre completo"
      required
    >
  </div>

  <div class="mb-3">
    <input 
      type="text" 
      class="form-control input-estilo" 
      placeholder="Alias"
      required
    >
  </div>

  <div class="mb-3">
    <input 
      type="email" 
      class="form-control input-estilo" 
      placeholder="Correo electrónico"
      required
    >
  </div>

  <div class="mb-3">

    <label class="form-label texto-label">
      Fecha de nacimiento
    </label>

    <input 
      type="date" 
      class="form-control input-estilo"
      required
    >

  </div>

  <div class="mb-3">

    <select class="form-select input-estilo" required>

      <option selected disabled value="">
        Género
      </option>

      <option>Masculino</option>
      <option>Femenino</option>
      <option>Prefiero no decirlo</option>

    </select>

  </div>

  <div class="mb-3">
    <input 
      type="password" 
      class="form-control input-estilo" 
      placeholder="Contraseña"
      minlength="6"
      required
    >
  </div>

  <div class="mb-4">
    <input 
      type="password" 
      class="form-control input-estilo" 
      placeholder="Confirmar contraseña"
      minlength="6"
      required
    >
  </div>

  <button type="submit" class="btn botonsesion w-100">
    Crear cuenta
  </button>

</form>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </main>

  <footer class="text-center py-4 footer-color">

    <div class="mb-3">

      <a href="https://www.facebook.com/p/Toscana-Caf%C3%A9-suc-Puebla-61551571272383/">
        <img src="./images/facebook.png" width="40">
      </a>

      <a href="https://www.instagram.com/explore/locations/145080692012847/toscana-cafe-suc-puebla/">
        <img src="./images/instagram.png" width="40">
      </a>

      <a href="https://www.tiktok.com/@toscanacafe?is_from_webapp=1&sender_device=pc">
        <img src="./images/tiktok.png" width="40">
      </a>

    </div>

    <p>Toscana | Reservados todos los derechos</p>

  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
